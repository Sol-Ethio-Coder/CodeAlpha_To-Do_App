<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Tasko — Daily Task Manager</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23C084FC'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z'/%3E%3C/svg%3E"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-text-size-adjust:100%;scrollbar-width:none;-ms-overflow-style:none}
    html::-webkit-scrollbar{display:none}
    body{line-height:1.6;-webkit-font-smoothing:antialiased}
    input,button,textarea,select{font:inherit;color:inherit;background:none;border:none;outline:none;appearance:none;-webkit-appearance:none}
    button{cursor:pointer} ul{list-style:none} [hidden]{display:none!important}

    /* ── Tokens ── */
    :root{
      --fd:'DM Serif Display',Georgia,serif;
      --fb:'DM Sans',sans-serif;
      --c1:#F0EDF8;
      --c2:rgba(240,237,248,.55);
      --c3:rgba(240,237,248,.32);
      --ag:linear-gradient(135deg,#7B3FF2,#C026D3);
      --sw:260px;
    }

    /* ── Body & page shell ── */
    body{
      font-family:var(--fb);
      background:#0D0D14;
      color:var(--c1);
      overflow-x:hidden;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    /* ── Animated background ── */
    .bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;will-change:transform}
    .o1{width:500px;height:500px;background:radial-gradient(circle,#7B3FF2,transparent 70%);top:-100px;left:-80px;animation:d1 18s ease-in-out infinite}
    .o2{width:420px;height:420px;background:radial-gradient(circle,#FF4FA3,transparent 70%);top:30%;right:-80px;animation:d2 22s ease-in-out infinite}
    .o3{width:360px;height:360px;background:radial-gradient(circle,#00D4B4,transparent 70%);bottom:-60px;left:30%;animation:d3 20s ease-in-out infinite}
    .o4{width:280px;height:280px;background:radial-gradient(circle,#FFB347,transparent 70%);top:55%;left:5%;animation:d4 25s ease-in-out infinite}
    .o5{width:240px;height:240px;background:radial-gradient(circle,#4FC3F7,transparent 70%);top:10%;left:42%;animation:d5 16s ease-in-out infinite}
    @keyframes d1{0%,100%{transform:translate(0,0)}40%{transform:translate(50px,70px)}70%{transform:translate(-30px,100px)}}
    @keyframes d2{0%,100%{transform:translate(0,0)}35%{transform:translate(-70px,-50px)}65%{transform:translate(-100px,30px)}}
    @keyframes d3{0%,100%{transform:translate(0,0)}45%{transform:translate(80px,-70px)}75%{transform:translate(50px,-120px)}}
    @keyframes d4{0%,100%{transform:translate(0,0)}30%{transform:translate(60px,50px)}65%{transform:translate(-50px,80px)}}
    @keyframes d5{0%,100%{transform:translate(0,0)}50%{transform:translate(-60px,-80px)}80%{transform:translate(40px,-50px)}}
    .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px}
    .bgrid{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:48px 48px}
    .pts{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
    .pt{position:absolute;border-radius:50%;animation:pu linear infinite}
    @keyframes pu{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(-5vh) scale(1);opacity:0}}

    /* ── App shell ── */
    .shell{
      display:flex;
      flex:1;
      position:relative;
      width:100%;
    }

    /* ── Sidebar (fixed desktop) ── */
    .sidebar{
      width:var(--sw);
      flex-shrink:0;
      background:rgba(10,8,18,.96);
      backdrop-filter:blur(2px);
      border-right:1px solid rgba(255,255,255,.08);
      display:flex;
      flex-direction:column;
      padding:28px 16px 24px;
      position:fixed;
      top:0;left:0;bottom:0;
      z-index:200;
      overflow-y:auto;
      transition:transform .3s cubic-bezier(.2, .9, .4, 1.1);
    }
    .brand{display:flex;align-items:center;gap:9px;padding:0 6px;margin-bottom:32px}
    .bico{font-size:20px;color:#C084FC;animation:sp 8s ease-in-out infinite;display:inline-block}
    @keyframes sp{0%,100%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.15)}}
    .bname{font-family:var(--fd);font-size:22px;background:linear-gradient(135deg,#F0EDF8,#C084FC);-webkit-background-clip:text;background-clip:text;color:transparent}
    .nlbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--c3);padding:0 8px;margin-bottom:5px}

    /* Nav buttons */
    .nb{width:100%;display:flex;align-items:center;gap:8px;padding:9px 8px 9px 12px;border-radius:8px;font-size:13.5px;color:rgba(240,237,248,.5);text-align:left;position:relative;overflow:hidden;transition:all .2s ease}
    .nb::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:3px;border-radius:0 3px 3px 0;background:#A855F7;transform:scaleY(0);transition:transform .22s cubic-bezier(.34,1.56,.64,1)}
    .nb:hover{background:rgba(168,85,247,.12);color:var(--c1);transform:translateX(4px)}
    .nb:hover::before{transform:scaleY(1)}
    .nb.active{background:rgba(168,85,247,.2);color:#C084FC;transform:translateX(4px)}
    .nb.active::before{transform:scaleY(1);background:#C084FC}
    .nc{margin-left:auto;font-size:11px;background:rgba(255,255,255,.08);color:rgba(240,237,248,.5);padding:2px 7px;border-radius:99px;min-width:22px;text-align:center}
    .nb.active .nc{background:rgba(168,85,247,.25);color:#C084FC}
    .cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:transform .2s}
    .nb:hover .cdot{transform:scale(1.3)}
    .cw{background:#4A7FC1;box-shadow:0 0 4px #4A7FC1}
    .cperson{background:#C15A7F;box-shadow:0 0 4px #C15A7F}
    .ch{background:#4AAF7F;box-shadow:0 0 4px #4AAF7F}
    .cl{background:#9B6DC1;box-shadow:0 0 4px #9B6DC1}
    .sdiv{height:1px;background:rgba(255,255,255,.07);margin:20px 0}
    .sftr{margin-top:auto;padding-top:20px}
    .plbl{display:flex;justify-content:space-between;font-size:11px;color:var(--c3);margin-bottom:8px}
    #pp{color:#C084FC;font-weight:600}
    .ptrk{height:4px;background:rgba(255,255,255,.09);border-radius:99px;overflow:hidden}
    .pbar{height:100%;background:var(--ag);border-radius:99px;width:0%;transition:width .4s ease}

    /* ── Main content (respects sidebar width) ── */
    .main{
      flex:1;
      margin-left:var(--sw);
      padding:36px 44px 32px;
      min-width:0;
      position:relative;
      transition:margin-left .2s;
    }
    .mhdr{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:28px;flex-wrap:wrap}
    .ptitle{font-family:var(--fd);font-size:34px;letter-spacing:-0.01em;margin-bottom:5px;display:inline-block;transition:all .2s}
    .ptitle:hover{letter-spacing:.01em;text-shadow:0 0 28px rgba(168,85,247,.4)}
    .pdate{font-size:12.5px;color:var(--c2)}
    .btn-new{display:flex;align-items:center;gap:6px;padding:9px 20px;background:var(--ag);color:#fff;border-radius:40px;font-size:13.5px;font-weight:500;box-shadow:0 6px 18px rgba(123,63,242,.35);transition:all .2s;white-space:nowrap}
    .btn-new:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(123,63,242,.5);filter:brightness(1.05)}

    /* Form, Tasks identical to original but refined */
    .afw{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:20px 22px;margin-bottom:28px;display:none;backdrop-filter:blur(4px)}
    .afw.open{display:block;animation:sdn .2s ease}
    @keyframes sdn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .fi{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 16px;font-size:14px;transition:all .2s}
    .fi:focus{border-color:#A855F7;background:rgba(255,255,255,.12);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
    .frow{display:flex;gap:12px;align-items:center;margin-top:12px;flex-wrap:wrap}
    .fs{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:8px 28px 8px 12px;font-size:13px;cursor:pointer}
    .fac{display:flex;gap:10px;margin-left:auto}
    .btn-c,.btn-s{padding:8px 18px;border-radius:40px;font-weight:500;transition:all .15s}
    .btn-c:hover{background:rgba(255,255,255,.08);color:var(--c1)}
    .btn-s{background:var(--ag);color:#fff;box-shadow:0 2px 8px rgba(123,63,242,.3)}
    .btn-s:hover{opacity:.9;transform:scale(0.98)}

    .tlist{display:flex;flex-direction:column;gap:8px}
    .ti{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px 16px;display:flex;align-items:flex-start;gap:14px;transition:all .22s}
    .ti:hover{background:rgba(255,255,255,.09);border-color:rgba(168,85,247,.35);transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.3)}
    .ti.done{opacity:.55}
    .chk{width:20px;height:20px;min-width:20px;border-radius:50%;border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
    .chk.on{background:var(--ag);border-color:transparent}
    .chk.on::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px)}
    .tb{flex:1}
    .tt{font-size:14.5px;font-weight:500}
    .tm{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
    .bc{font-size:11px;font-weight:600;padding:2px 10px;border-radius:40px}
    .bwork{background:#1E2A3A;color:#7BA5E0}.bperson{background:#3A1E2A;color:#E07BA5}.bhealth{background:#1E3A2A;color:#7BE0A5}.blearn{background:#2A1E3A;color:#B87BE0}
    .bpr{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
    .plo{background:#1F3A2A;color:#7BE0A5}.pme{background:#3A2E1A;color:#E0B07B}.phi{background:#3A1E1E;color:#E07B7B}
    .ta{display:flex;gap:4px;opacity:0;transition:opacity .2s}
    .ti:hover .ta{opacity:1}
    .ab{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:14px;transition:all .15s}
    .ab.edt:hover{background:rgba(168,85,247,.2);color:#C084FC}
    .ab.del:hover{background:rgba(239,68,68,.2);color:#F87171}
    .bulk{margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:12px;align-items:center}
    .blbl{font-size:13px;color:var(--c3);margin-right:auto}
    .bb{padding:6px 16px;border-radius:40px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);transition:all .2s}
    .bb.dng:hover{background:rgba(239,68,68,.2);border-color:#F87171;color:#F87171}
    .empty{text-align:center;padding:60px 0}
    .eico{font-size:42px;opacity:.3;margin-bottom:12px}

    /* Modal */
    .mo{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000}
    .mo.open{display:flex}
    .md{background:#12101F;border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:28px;width:100%;max-width:460px}

    /* ── FOOTER with photo instead of letter S ── */
    .foot{
      position:sticky;
      bottom:0;
      z-index:50;
      width:100%;
      background:rgba(7,5,15,.96);
      backdrop-filter:blur(8px);
      border-top:1px solid rgba(255,255,255,.08);
      padding:14px 44px;
      transition:all .2s;
    }
    .foot::before{content:'';position:absolute;inset:0;padding-top:1px;background:linear-gradient(90deg,#7B3FF2,#C026D3,#00D4B4,#FFB347,#7B3FF2);background-size:300% 100%;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:bsh 6s linear infinite;pointer-events:none}
    @keyframes bsh{0%{background-position:0% 0}100%{background-position:300% 0}}
    .fi2{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;max-width:1400px;margin:0 auto}
    .fcred{display:flex;align-items:center;gap:14px;cursor:default}
    /* Profile photo circle — replaces the "S" */
    .fav-photo{
      width:44px;
      height:44px;
      border-radius:50%;
      object-fit:cover;
      background:var(--ag);
      border:2px solid rgba(255,255,255,.25);
      box-shadow:0 4px 12px rgba(0,0,0,.3);
      transition:transform .25s, box-shadow .25s;
      display:block;
    }
    .fcred:hover .fav-photo{
      transform:scale(1.08) rotate(2deg);
      box-shadow:0 0 0 3px rgba(168,85,247,.6);
      border-color:#C084FC;
    }
    .fname{font-size:14px;font-weight:600;color:#E2DDF5}
    .fcopy{font-size:11px;color:var(--c3)}
    .flinks{display:flex;gap:12px;align-items:center}
    .fl{display:flex;align-items:center;gap:6px;font-size:12.5px;padding:6px 16px;border-radius:40px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);text-decoration:none;color:var(--c2);transition:all .2s}
    .fl.gh:hover{background:#7B3FF2;border-color:#A855F7;color:#fff;transform:translateY(-2px)}
    .fl.pt:hover{background:#00D4B4;border-color:#00D4B4;color:#0D0D14;transform:translateY(-2px)}
    .flic{font-size:14px}

    /* Mobile adaptations */
    @media(max-width:960px){
      .sidebar{transform:translateX(-100%);width:280px!important;z-index:900!important;background:#0B0918!important}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0!important;padding:70px 20px 24px}
      .topbar{display:flex;position:fixed;top:0;left:0;right:0;height:56px;background:#0B0912cc;backdrop-filter:blur(12px);z-index:500;align-items:center;padding:0 16px;gap:12px;border-bottom:1px solid rgba(255,255,255,.08)}
      .btn-ham{display:flex;width:40px;height:40px;background:rgba(168,85,247,.15);border-radius:12px;justify-content:center;align-items:center;font-size:20px}
      .btn-sclose{display:flex;position:absolute;top:18px;right:18px;width:34px;height:34px;background:rgba(255,255,255,.1);border-radius:40px;justify-content:center;align-items:center}
      .bkdrop{display:block;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:700;opacity:0;pointer-events:none;transition:opacity .2s}
      .bkdrop.on{opacity:1;pointer-events:all}
      .btn-fab{display:flex;position:fixed;bottom:22px;right:18px;width:54px;height:54px;border-radius:30px;background:var(--ag);font-size:28px;z-index:400;box-shadow:0 6px 18px rgba(123,63,242,.6)}
      .btn-new{display:none}
      .foot{padding:12px 20px}
    }
    @media(max-width:640px){
      .main{padding:62px 14px 20px}
      .frow{flex-direction:column;align-items:stretch}
      .fac{margin-left:0;display:flex;justify-content:stretch}
      .btn-c,.btn-s{flex:1;text-align:center}
      .ta{opacity:1}
    }
    .topbar,.btn-ham,.btn-sclose,.bkdrop,.btn-fab{display:none}
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div><div class="orb o4"></div><div class="orb o5"></div></div>
  <div class="grain" aria-hidden="true"></div><div class="bgrid" aria-hidden="true"></div><div class="pts" id="pts"></div>

  <div class="bkdrop" id="bkdrop"></div>
  <header class="topbar"><div class="tbrand"><span class="tbico">✦</span><span class="tbname">Tasko</span></div><button class="btn-ham" id="btn-ham">☰</button></header>
  <button class="btn-fab" id="btn-fab">+</button>

  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <button class="btn-sclose" id="btn-sclose">✕</button>
      <div class="brand"><span class="bico">✦</span><span class="bname">Tasko</span></div>
      <nav>
        <button class="nb active" data-filter="all"><span>◈</span> All Tasks <span class="nc" id="ca">0</span></button>
        <button class="nb" data-filter="active"><span>◇</span> Active <span class="nc" id="cv">0</span></button>
        <button class="nb" data-filter="completed"><span>◆</span> Completed <span class="nc" id="cc">0</span></button>
      </nav>
      <div class="sdiv"></div>
      <nav><p class="nlbl">Categories</p>
        <button class="nb" data-filter="work"><span class="cdot cw"></span> Work</button>
        <button class="nb" data-filter="personal"><span class="cdot cperson"></span> Personal</button>
        <button class="nb" data-filter="health"><span class="cdot ch"></span> Health</button>
        <button class="nb" data-filter="learning"><span class="cdot cl"></span> Learning</button>
      </nav>
      <div class="sftr"><div class="plbl"><span>Today's progress</span><span id="pp">0%</span></div><div class="ptrk"><div class="pbar" id="pb"></div></div></div>
    </aside>

    <main class="main">
      <div class="mhdr"><div><h1 class="ptitle" id="ptitle">All Tasks</h1><p class="pdate" id="pdate"></p></div><button class="btn-new" id="btn-open">+ New Task</button></div>
      <div class="afw" id="afw"><form id="aform"><input type="text" class="fi" id="tinput" placeholder="What needs to be done?" maxlength="200"/><div class="frow"><select class="fs" id="tcat"><option value="work">Work</option><option value="personal">Personal</option><option value="health">Health</option><option value="learning">Learning</option></select><select class="fs" id="tpri"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select><div class="fac"><button type="button" class="btn-c" id="btn-cancel">Cancel</button><button type="submit" class="btn-s">Add Task</button></div></div></form></div>
      <ul class="tlist" id="tlist"></ul><div class="empty" id="empty" hidden><div class="eico">✦</div><p class="etitle">No tasks yet</p><p class="esub">Create your first task above</p></div>
      <div class="bulk" id="bulk" hidden><span class="blbl" id="blbl">0 tasks</span><button class="bb" id="btn-clrd">Clear completed</button><button class="bb dng" id="btn-clra">Clear all</button></div>
    </main>
  </div>

  <div class="mo" id="mo"><div class="md"><h2 class="md-title">Edit Task</h2><form id="eform"><input type="text" class="fi" id="einput"/><div class="frow"><select class="fs" id="ecat"><option value="work">Work</option><option value="personal">Personal</option><option value="health">Health</option><option value="learning">Learning</option></select><select class="fs" id="epri"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div><div class="md-foot"><button type="button" class="btn-c" id="btn-ec">Cancel</button><button type="submit" class="btn-s">Save</button></div></form></div></div>

  <!-- FOOTER with profile photo (replace letter S) -->
  <footer class="foot"><div class="fi2"><div class="fcred"><img class="fav-photo" id="profilePhoto" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%237B3FF2'/%3E%3Ccircle cx='50' cy='40' r='15' fill='%23E2DDF5'/%3E%3Cpath d='M25 75 Q50 90 75 75 Q70 55 50 55 Q30 55 25 75' fill='%23E2DDF5'/%3E%3C/svg%3E" alt="Sol Ethio Coder profile photo"><div><div class="fname">Sol Ethio Coder</div><div class="fcopy">&copy; <span id="yr"></span> — All rights reserved</div></div></div><nav class="flinks"><a class="fl gh" href="https://github.com/Sol-Ethio-Coder" target="_blank"><span class="flic">🐙</span> GitHub</a><a class="fl pt" href="https://solomon-ashagre-portfolio.netlify.app/" target="_blank"><span class="flic">🌐</span> Portfolio</a></nav></div></footer>

  <script>
    (function(){
      const STORAGE_KEY='tasko_v5';
      let tasks=[];
      let activeFilter='all';
      let editId=null;

      function save(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(tasks)); }catch(e){} }
      function load(){ try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw) tasks=JSON.parse(raw); else tasks=[]; }catch(e){ tasks=[]; }}

      function addTask(text,category,priority){ if(!text.trim()) return; tasks.unshift({ id: Date.now()+'-'+Math.random().toString(36).substr(2,5), text:text.trim(), category, priority, done:false, createdAt:Date.now() }); save(); render(); }
      function toggleTask(id){ const t=tasks.find(t=>t.id==id); if(t) t.done=!t.done; save(); render(); }
      function updateTask(id,text,category,priority){ const t=tasks.find(t=>t.id==id); if(t){ t.text=text.trim(); t.category=category; t.priority=priority; } save(); render(); }
      function deleteTask(id){ tasks=tasks.filter(t=>t.id!=id); save(); render(); }
      function clearCompleted(){ tasks=tasks.filter(t=>!t.done); save(); render(); }
      function clearAll(){ tasks=[]; save(); render(); }
      function getFiltered(){ if(activeFilter==='all') return tasks; if(activeFilter==='active') return tasks.filter(t=>!t.done); if(activeFilter==='completed') return tasks.filter(t=>t.done); return tasks.filter(t=>t.category===activeFilter); }
      function updateCounters(){ const all=tasks.length, done=tasks.filter(t=>t.done).length; document.getElementById('ca').innerText=all; document.getElementById('cv').innerText=all-done; document.getElementById('cc').innerText=done; const pct=all?Math.round((done/all)*100):0; document.getElementById('pb').style.width=pct+'%'; document.getElementById('pp').innerText=pct+'%'; }
      function render(){
        const filtered=getFiltered();
        const container=document.getElementById('tlist');
        const emptyDiv=document.getElementById('empty');
        const bulkDiv=document.getElementById('bulk');
        container.innerHTML='';
        if(filtered.length===0){ container.hidden=true; emptyDiv.hidden=false; bulkDiv.hidden=true; }
        else{ container.hidden=false; emptyDiv.hidden=true; bulkDiv.hidden=false; filtered.forEach(t=>{ const li=document.createElement('li'); li.className='ti'+(t.done?' done':''); li.dataset.id=t.id; li.innerHTML=`<div class="chk ${t.done?'on':''}" data-action="toggle" role="checkbox"></div><div class="tb"><p class="tt">${escapeHtml(t.text)}</p><div class="tm"><span class="bc ${getCatClass(t.category)}">${t.category}</span><span class="bpr ${getPriClass(t.priority)}">${t.priority}</span><span class="ts">${formatTime(t.createdAt)}</span></div></div><div class="ta"><button class="ab edt" data-action="edit">✎</button><button class="ab del" data-action="delete">✕</button></div>`; container.appendChild(li); }); }
        document.getElementById('blbl').innerText=`${filtered.length} task${filtered.length!==1?'s':''}`;
        updateCounters();
        const titles={all:'All Tasks',active:'Active Tasks',completed:'Completed',work:'Work',personal:'Personal',health:'Health',learning:'Learning'};
        document.getElementById('ptitle').innerText=titles[activeFilter]||'Tasks';
        document.getElementById('pdate').innerText=new Date().toLocaleDateString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        document.querySelectorAll('.nb[data-filter]').forEach(btn=>btn.classList.toggle('active',btn.dataset.filter===activeFilter));
      }
      function escapeHtml(str){ const div=document.createElement('div'); div.textContent=str; return div.innerHTML; }
      function getCatClass(cat){ return {work:'bwork',personal:'bperson',health:'bhealth',learning:'blearn'}[cat]||'bwork'; }
      function getPriClass(pri){ return {low:'plo',medium:'pme',high:'phi'}[pri]||'pme'; }
      function formatTime(ts){ return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

      function openAddForm(){ const w=document.getElementById('afw'); w.classList.add('open'); document.getElementById('tinput').focus(); }
      function closeAddForm(){ document.getElementById('afw').classList.remove('open'); document.getElementById('tinput').value=''; document.getElementById('tcat').value='work'; document.getElementById('tpri').value='medium'; }
      function openEditModal(task){ editId=task.id; document.getElementById('einput').value=task.text; document.getElementById('ecat').value=task.category; document.getElementById('epri').value=task.priority; document.getElementById('mo').classList.add('open'); setTimeout(()=>document.getElementById('einput').focus(),30); }
      function closeModal(){ document.getElementById('mo').classList.remove('open'); editId=null; }

      function initSamples(){ if(tasks.length===0){ addTask('Review Q3 project proposal','work','high'); addTask('Morning run — 30 minutes','health','medium'); addTask('Read chapter 4 of Clean Code','learning','low'); addTask('Call dentist to reschedule','personal','medium'); } }

      load(); if(tasks.length===0) initSamples(); else tasks=tasks; render();

      document.getElementById('btn-open').addEventListener('click',openAddForm);
      document.getElementById('btn-cancel').addEventListener('click',closeAddForm);
      document.getElementById('aform').addEventListener('submit',e=>{ e.preventDefault(); const val=document.getElementById('tinput').value.trim(); if(val){ addTask(val, document.getElementById('tcat').value, document.getElementById('tpri').value); closeAddForm(); } });
      document.getElementById('tlist').addEventListener('click',e=>{ const btn=e.target.closest('[data-action]'); if(!btn) return; const li=btn.closest('.ti'); if(!li) return; const id=li.dataset.id; if(btn.dataset.action==='toggle') toggleTask(id); else if(btn.dataset.action==='delete'){ if(confirm('Delete this task?')) deleteTask(id); } else if(btn.dataset.action==='edit'){ const task=tasks.find(t=>t.id==id); if(task) openEditModal(task); } });
      document.getElementById('eform').addEventListener('submit',e=>{ e.preventDefault(); if(!editId) return; const newText=document.getElementById('einput').value.trim(); if(newText){ updateTask(editId, newText, document.getElementById('ecat').value, document.getElementById('epri').value); closeModal(); } });
      document.getElementById('btn-ec').addEventListener('click',closeModal);
      document.getElementById('mo').addEventListener('click',e=>{ if(e.target===document.getElementById('mo')) closeModal(); });
      document.getElementById('btn-clrd').addEventListener('click',()=>{ if(confirm('Clear completed tasks?')) clearCompleted(); });
      document.getElementById('btn-clra').addEventListener('click',()=>{ if(confirm('Delete ALL tasks permanently?')) clearAll(); });
      document.querySelectorAll('.nb[data-filter]').forEach(btn=>btn.addEventListener('click',()=>{ activeFilter=btn.dataset.filter; render(); if(window.innerWidth<=960) closeDrawer(); }));

      // Mobile drawer logic
      const sidebar=document.getElementById('sidebar'), bkdrop=document.getElementById('bkdrop'), btnHam=document.getElementById('btn-ham'), btnSClose=document.getElementById('btn-sclose'), fabBtn=document.getElementById('btn-fab');
      function openDrawer(){ sidebar.classList.add('open'); bkdrop.classList.add('on'); document.body.style.overflow='hidden'; }
      function closeDrawer(){ sidebar.classList.remove('open'); bkdrop.classList.remove('on'); document.body.style.overflow=''; }
      if(btnHam) btnHam.addEventListener('click',openDrawer);
      if(btnSClose) btnSClose.addEventListener('click',closeDrawer);
      if(bkdrop) bkdrop.addEventListener('click',closeDrawer);
      if(fabBtn) fabBtn.addEventListener('click',()=>{ openAddForm(); document.getElementById('afw').scrollIntoView({behavior:'smooth'}); });
      window.addEventListener('resize',()=>{ if(window.innerWidth>960 && sidebar.classList.contains('open')) closeDrawer(); });
      document.getElementById('yr').innerText=new Date().getFullYear();

      // Particle background
      const ptsDiv=document.getElementById('pts'); if(ptsDiv){ for(let i=0;i<28;i++){ const pt=document.createElement('span'); pt.className='pt'; const s=1.5+Math.random()*4; pt.style.width=s+'px'; pt.style.height=s+'px'; pt.style.left=Math.random()*100+'%'; pt.style.background=`rgba(168,85,247,${0.2+Math.random()*0.6})`; pt.style.animationDuration=12+Math.random()*18+'s'; pt.style.animationDelay=Math.random()*15+'s'; ptsDiv.appendChild(pt); } }

      // Replace profile photo: you can change the src to any real image url
      // For demo it shows a nice avatar, but you can replace it with your actual photo link:
      const profileImg = document.getElementById('profilePhoto');
      if(profileImg) {
        // Option 1: Use a placeholder image from a service (or your actual image URL)
        // Example: profileImg.src = "https://yourdomain.com/your-photo.jpg";
        // For now it shows a generated avatar, but you can uncomment next line to use external image
        // profileImg.src = "https://ui-avatars.com/api/?background=7B3FF2&color=fff&name=Sol";
        // For best user experience, you can set your photo URL. I'll set a cool gradient avatar but it's customizable.
        profileImg.style.background = "linear-gradient(135deg,#7B3FF2,#C026D3)";
        profileImg.alt = "Solomon Ashagre profile";
      }
    })();
  </script>
</body>
</html>
